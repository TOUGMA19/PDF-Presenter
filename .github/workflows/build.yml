name: Build PDF Presenter

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v3.1.0)'
        required: true
        default: 'v3.0.0'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS .app
        run: |
          pyinstaller --noconfirm packaging/pdf_presenter.spec

      - name: Create ZIP archive
        run: |
          cd dist && zip -qr "PDF-Presenter-macOS.zip" "PDF Presenter.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Presenter-macOS
          path: dist/PDF-Presenter-macOS.zip

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PDF-Presenter-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows .exe
        run: |
          pyinstaller --noconfirm packaging\pdf_presenter.spec

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Compile installer (.iss)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload artifact (portable ZIP)
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Presenter-Windows-Portable
          path: dist/PDF-Presenter-Windows.zip

      - name: Upload artifact (installer)
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Presenter-Windows-Setup
          path: dist/PDF-Presenter-Setup.exe

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PDF-Presenter-Windows.zip
            dist/PDF-Presenter-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
